{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Portal Login — PhishDetect AI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">

    <h1 class="login-title">Admin Portal Login</h1>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'admin_login' %}">
      {% csrf_token %}

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          placeholder="Enter admin ID"
          autocomplete="username"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-eye" id="toggle-eye"
                  aria-label="Toggle password visibility">
            <!-- Eye open icon (shown by default) -->
            <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="#6B7280" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye closed icon (hidden by default) -->
            <svg id="eye-closed" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="#6B7280" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round"
                 style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20
                       C5 20 1 12 1 12a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4
                       c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Login</button>

    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
